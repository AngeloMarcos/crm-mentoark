name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.9.172
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/crm/deploy.sh
          command_timeout: 10m
